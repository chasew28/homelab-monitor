<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Homelab Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.18);
      --text: #ececec;
      --text-secondary: #bcbcbc;
      --text-muted: #959595;
      --accent: #818cf8;
      --success: #4ade80;
      --success-bg: rgba(74,222,128,0.12);
      --warning: #fbbf24;
      --warning-bg: rgba(251,191,36,0.12);
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.12);
      --radius: 12px;
      --radius-lg: 16px;
      --shadow: 0 2px 16px rgba(0,0,0,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1120px; margin: 0 auto; padding: 1.5rem 2rem; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      position: relative;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f1f5f9 0%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .last-updated {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .btn-group { display: flex; gap: 0.5rem; }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.15s ease;
    }
    .btn:hover {
      background: rgba(255,255,255,0.06);
      border-color: var(--border-hover);
      color: var(--text);
    }
    .btn-primary {
      background: rgba(129,140,248,0.12);
      border-color: rgba(129,140,248,0.2);
      color: var(--accent);
    }
    .btn-primary:hover {
      background: rgba(129,140,248,0.2);
      border-color: rgba(129,140,248,0.3);
    }

    .update-banner {
      background: var(--success-bg);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: var(--radius);
      padding: 0.6rem 1rem;
      margin-bottom: 1.25rem;
      display: none;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      animation: fadeIn 0.3s ease;
    }
    .update-banner.show { display: flex; }
    .update-banner a {
      color: var(--success);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .update-banner a:hover { text-decoration: underline; }

    .quick-stats {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .stat-pill .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .stat-pill .dot.up { background: var(--success); }
    .stat-pill .dot.degraded { background: var(--warning); }
    .stat-pill .dot.down { background: var(--error); }
    .stat-pill .total { color: var(--text); }
    .stat-pill .up { color: var(--success); }
    .stat-pill .degraded { color: var(--warning); }
    .stat-pill .down { color: var(--error); }

    .search-bar {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .search-bar input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.15s ease;
    }
    .search-bar input:focus {
      border-color: rgba(129,140,248,0.3);
      box-shadow: 0 0 0 3px rgba(129,140,248,0.08);
    }
    .search-bar input::placeholder { color: var(--text-muted); }
    .search-bar .search-icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
      animation: fadeIn 0.4s ease both;
    }
    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .card-accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      border-radius: 3px 0 0 3px;
    }
    .card-accent.up { background: var(--success); box-shadow: 0 0 10px rgba(74,222,128,0.3); }
    .card-accent.degraded { background: var(--warning); box-shadow: 0 0 10px rgba(251,191,36,0.3); }
    .card-accent.down { background: var(--error); box-shadow: 0 0 10px rgba(248,113,113,0.3); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.6rem;
    }
    .card-left { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
    .card-name { font-weight: 600; font-size: 0.9rem; color: var(--text); }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.15rem 0.55rem;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: capitalize;
      white-space: nowrap;
    }
    .status-badge.up { background: var(--success-bg); color: var(--success); }
    .status-badge.degraded { background: var(--warning-bg); color: var(--warning); }
    .status-badge.down { background: var(--error-bg); color: var(--error); }
    .card-url {
      color: var(--text-secondary);
      font-size: 0.75rem;
      word-break: break-all;
      margin-bottom: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .card-meta .host-badge {
      background: rgba(255,255,255,0.04);
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      border: 1px solid var(--border);
    }
    .card-meta .latency {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-secondary);
    }
    .service-logo { display: inline-flex; vertical-align: middle; flex-shrink: 0; }
    .service-logo svg { display: block; }

    .service-stats {
      display: flex;
      gap: 1rem;
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
    }
    .stat-item .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }
    .stat-item .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      margin-top: 0.1rem;
    }
    .stat-item .stat-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .auth-hint {
      color: var(--warning);
      font-size: 0.75rem;
      margin-top: 0.5rem;
      font-style: italic;
    }
    .card.hidden { display: none; }

    .node-section { margin-bottom: 2rem; }
    .node-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }
    .node-name { font-weight: 600; font-size: 0.95rem; color: var(--text); }
    .node-hostname {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .system-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.75rem;
    }
    .gauge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      transition: all 0.2s ease;
    }
    .gauge:hover { border-color: var(--border-hover); }
    .gauge-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .gauge-value {
      font-size: 1.35rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 0.5rem;
    }
    .gauge-bar {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .gauge-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .gauge-bar-fill.low { background: var(--success); }
    .gauge-bar-fill.med { background: var(--warning); }
    .gauge-bar-fill.high { background: var(--error); }
    .gauge-detail {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .docker-section { margin-bottom: 2.5rem; }
    .docker-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .docker-table th {
      text-align: left;
      padding: 0.65rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .docker-table td {
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-family: 'JetBrains Mono', monospace;
    }
    .docker-table tr:last-child td { border-bottom: none; }
    .docker-table tr:hover td { background: rgba(255,255,255,0.02); }
    .container-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .container-pill.running { background: var(--success-bg); color: var(--success); }
    .container-pill.exited { background: var(--error-bg); color: var(--error); }
    .container-pill.paused { background: var(--warning-bg); color: var(--warning); }
    .container-pill .cdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .container-pill .cdot.running { background: var(--success); }
    .container-pill .cdot.exited { background: var(--error); }
    .container-pill .cdot.paused { background: var(--warning); }

    .error-state { color: var(--error); padding: 1.5rem; text-align: center; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
      padding: 2rem;
    }
    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 640px;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 1.1rem; color: var(--text); font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.25rem;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--error); }
    .modal-body { padding: 1.5rem; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .settings-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
    }
    .settings-input:focus { border-color: rgba(129,140,248,0.4); }
    .settings-field { margin-bottom: 0.75rem; }
    .settings-field label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    .settings-field label input[type="checkbox"] { margin-right: 0.35rem; }
    .settings-node {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .settings-node-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .settings-remove {
      background: none;
      border: none;
      color: var(--error);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
    .settings-remove:hover { background: rgba(248,113,113,0.1); }
    .settings-service {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .settings-service .s-svc-name { flex: 1; }
    .settings-service .s-svc-url { flex: 2; }
    .settings-services { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .settings-services label { display: block; margin-bottom: 0.4rem; }
    .settings-auth { margin-top: 0.5rem; padding: 0.5rem; background: rgba(255,255,255,0.02); border-radius: 8px; }
    .settings-auth summary { cursor: pointer; font-size: 0.8rem; color: var(--text-muted); }
    .settings-auth summary:hover { color: var(--text); }
    .settings-auth .settings-field { margin-bottom: 0.4rem; }
    .settings-auth .settings-field label { font-size: 0.75rem; }
    .settings-auth select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      outline: none;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      header h1 { font-size: 1.4rem; }
      .cards { grid-template-columns: 1fr; }
      .system-grid { grid-template-columns: 1fr 1fr; }
      .header-actions { flex-direction: column; gap: 0.75rem; align-items: stretch; text-align: center; }
      .btn-group { justify-content: center; }
      .service-stats { flex-wrap: wrap; gap: 0.75rem; }
      .docker-table { font-size: 0.75rem; }
      .docker-table th, .docker-table td { padding: 0.5rem 0.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="title">⚡ Homelab Monitor</h1>
      <p class="subtitle">Real-time status of your infrastructure</p>
      <div class="header-actions">
        <span class="last-updated" id="lastUpdated">Loading...</span>
        <div class="btn-group">
          <button class="btn" id="settingsBtn">⚙ Settings</button>
          <button class="btn btn-primary" id="refreshBtn">↻ Refresh</button>
        </div>
      </div>
    </header>

    <div id="updateBanner" class="update-banner">
      <span>🚀 <span id="updateMsg">Update available</span></span>
      <a href="#" onclick="event.preventDefault(); window.open('https://github.com/chasew28/homelab-monitor/releases', '_blank')">View Release</a>
    </div>

    <div class="quick-stats" id="quickStats"></div>

    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search services..." oninput="filterServices()">
    </div>

    <div class="section-title">Services</div>
    <div class="cards" id="servicesCards">
      <div class="card"><p style="color:var(--text-muted);font-size:0.85rem">Loading services...</p></div>
    </div>

    <div class="section-title">System Resources</div>
    <div id="systemGrid"></div>

    <div class="section-title" id="dockerTitle" style="display:none">Docker Containers</div>
    <div id="dockerSection"></div>
  </div>

  <div id="settingsModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body" id="settingsBody"></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeSettings()">Cancel</button>
        <button class="btn btn-primary" id="saveSettingsBtn" onclick="saveSettings()">Save Changes</button>
      </div>
    </div>
  </div>

  <footer>
    <p>Homelab Monitor &mdash; Open source infrastructure dashboard</p>
  </footer>

  <script>
    const API_BASE = '/api';

    async function fetchJSON(endpoint) {
      const res = await fetch(`${API_BASE}${endpoint}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function updateTime() {
      document.getElementById('lastUpdated').textContent =
        `Last updated: ${new Date().toLocaleTimeString()}`;
    }

    const LOGOS = {
      adguard: '<svg viewBox="0 0 32 32" width="26" height="26"><path d="M16 4L6 8v6c0 5.5 4 10.7 10 12.5 6-1.8 10-7 10-12.5V8l-10-4z" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5" stroke-linejoin="round"/><path d="M12 17l3 3 6-6" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      pihole: '<svg viewBox="0 0 32 32" width="26" height="26"><path d="M16 4L6 8v6c0 5.5 4 10.7 10 12.5 6-1.8 10-7 10-12.5V8l-10-4z" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5" stroke-linejoin="round"/><circle cx="16" cy="16" r="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/><line x1="13.5" y1="18.5" x2="18.5" y2="13.5" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/></svg>',
      plex: '<svg viewBox="0 0 32 32" width="26" height="26"><rect width="32" height="32" rx="8" fill="rgba(249,115,22,0.15)"/><path d="M13 7l7 9-7 9" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      qbittorrent: '<svg viewBox="0 0 32 32" width="26" height="26"><rect width="32" height="32" rx="8" fill="rgba(34,211,238,0.15)"/><circle cx="16" cy="16" r="5" fill="none" stroke="#22d3ee" stroke-width="1.5"/><polygon points="14,13 14,19 19,16" fill="#22d3ee"/></svg>',
    };

    function fmtNum(n) {
      if (n === undefined || n === null) return '';
      return n.toLocaleString();
    }

    function fmtSpeed(bps) {
      if (!bps) return '0 B/s';
      const u = ['B/s','KB/s','MB/s','GB/s']; let i = 0; let v = bps;
      while (v >= 1000 && i < u.length - 1) { v /= 1000; i++; }
      return `${v.toFixed(v >= 10 ? 0 : 1)} ${u[i]}`;
    }

    function renderQuickStats(data) {
      const container = document.getElementById('quickStats');
      if (!data || data.length === 0) {
        container.innerHTML = '';
        return;
      }
      const total = data.length;
      const up = data.filter(s => s.status === 'up').length;
      const degraded = data.filter(s => s.status === 'degraded').length;
      const down = data.filter(s => s.status === 'down').length;
      container.innerHTML = `
        <span class="stat-pill"><span style="color:var(--text);font-weight:600">${total}</span> Services</span>
        ${up ? `<span class="stat-pill"><span class="dot up"></span><span class="up">${up} Up</span></span>` : ''}
        ${degraded ? `<span class="stat-pill"><span class="dot degraded"></span><span class="degraded">${degraded} Degraded</span></span>` : ''}
        ${down ? `<span class="stat-pill"><span class="dot down"></span><span class="down">${down} Down</span></span>` : ''}
      `;
    }

    function filterServices() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('#servicesCards .card').forEach(card => {
        const text = card.dataset.search || '';
        card.classList.toggle('hidden', q && !text.includes(q));
      });
      document.querySelectorAll('#systemGrid .node-section').forEach(section => {
        const text = section.dataset.search || '';
        section.style.display = q && !text.includes(q) ? 'none' : '';
      });
    }

    function renderServices(data) {
      const container = document.getElementById('servicesCards');
      renderQuickStats(data);
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="card"><p style="color:var(--text-muted);font-size:0.85rem">No services configured</p></div>';
        return;
      }
      container.innerHTML = data.map((s, i) => {
        const logoHtml = s.type && LOGOS[s.type] ? `<span class="service-logo">${LOGOS[s.type]}</span>` : '';
        const label = s.service_name || s.name;
        const searchText = `${label} ${s.url} ${s.host}`.toLowerCase();
        let statsHtml = '';
        if (s.authError) {
          statsHtml = '<div class="auth-hint">🔐 Auth required — add credentials in Settings</div>';
        } else if (s.stats) {
          const items = [];
          if (s.stats.queries !== undefined) items.push(`<div class="stat-item"><span class="stat-label">Queries</span><span class="stat-value">${fmtNum(s.stats.queries)}</span></div>`);
          if (s.stats.blocked !== undefined) items.push(`<div class="stat-item"><span class="stat-label">Blocked</span><span class="stat-value">${fmtNum(s.stats.blocked)}</span>${s.stats.blockedPercent !== undefined ? `<span class="stat-sub">${s.stats.blockedPercent}%</span>` : ''}</div>`);
          if (s.stats.sessions !== undefined) items.push(`<div class="stat-item"><span class="stat-label">Streaming</span><span class="stat-value">${s.stats.sessions}</span></div>`);
          if (s.stats.dl_speed !== undefined) items.push(`<div class="stat-item"><span class="stat-label">Download</span><span class="stat-value">${fmtSpeed(s.stats.dl_speed)}</span></div>`);
          if (s.stats.up_speed !== undefined) items.push(`<div class="stat-item"><span class="stat-label">Upload</span><span class="stat-value">${fmtSpeed(s.stats.up_speed)}</span></div>`);
          if (items.length) statsHtml = `<div class="service-stats">${items.join('')}</div>`;
        }
        return `
          <div class="card" data-search="${searchText}" style="animation-delay:${i * 0.04}s">
            <div class="card-accent ${s.status}"></div>
            <div class="card-header">
              <div class="card-left">
                ${logoHtml}
                <span class="card-name">${label}</span>
              </div>
              <span class="status-badge ${s.status}">${s.status}</span>
            </div>
            <div class="card-url">${s.url}</div>
            ${statsHtml}
            <div class="card-meta">
              ${s.latency_ms !== null ? `<span class="latency">${s.latency_ms}ms</span>` : ''}
              <span class="host-badge">${s.host}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderSystem(nodes) {
      const grid = document.getElementById('systemGrid');
      grid.innerHTML = '';

      function barClass(pct) { return pct < 60 ? 'low' : pct < 85 ? 'med' : 'high'; }
      function fmtBytes(b) {
        if (!b) return '0 B';
        const u = ['B','KB','MB','GB','TB']; let i = 0; let v = b;
        while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
        return `${v.toFixed(1)} ${u[i]}`;
      }
      function fmtUptime(s) {
        return `${Math.floor(s/86400)}d ${Math.floor((s%86400)/3600)}h ${Math.floor((s%3600)/60)}m`;
      }

      for (const [name, data] of Object.entries(nodes)) {
        if (data.error) {
          grid.innerHTML += `<div class="node-section" data-search="${name.toLowerCase()}"><div class="gauge error-state">${name}: ${data.error}</div></div>`;
          continue;
        }
        const temp = data.cpu_temp !== null ? `${data.cpu_temp}°C` : 'N/A';
        const searchText = `${name} ${data.hostname}`.toLowerCase();
        grid.innerHTML += `
          <div class="node-section" data-search="${searchText}">
            <div class="node-header">
              <span class="node-name">${name}</span>
              <span class="node-hostname">${data.hostname}</span>
            </div>
            <div class="system-grid">
              <div class="gauge">
                <div class="gauge-label">CPU</div>
                <div class="gauge-value">${data.cpu_percent}%</div>
                <div class="gauge-bar"><div class="gauge-bar-fill ${barClass(data.cpu_percent)}" style="width:${data.cpu_percent}%"></div></div>
                <div class="gauge-detail">${temp}</div>
              </div>
              <div class="gauge">
                <div class="gauge-label">RAM</div>
                <div class="gauge-value">${data.ram_percent}%</div>
                <div class="gauge-bar"><div class="gauge-bar-fill ${barClass(data.ram_percent)}" style="width:${data.ram_percent}%"></div></div>
                <div class="gauge-detail">${fmtBytes(data.ram_used)} / ${fmtBytes(data.ram_total)}</div>
              </div>
              <div class="gauge">
                <div class="gauge-label">Disk</div>
                <div class="gauge-value">${data.disk_percent}%</div>
                <div class="gauge-bar"><div class="gauge-bar-fill ${barClass(data.disk_percent)}" style="width:${data.disk_percent}%"></div></div>
                <div class="gauge-detail">${fmtBytes(data.disk_used)} / ${fmtBytes(data.disk_total)}</div>
              </div>
              <div class="gauge">
                <div class="gauge-label">Uptime</div>
                <div class="gauge-value" style="font-size:1.15rem">${fmtUptime(data.uptime_seconds)}</div>
                <div class="gauge-detail">${data.hostname}</div>
              </div>
            </div>
          </div>
        `;
      }
    }

    function renderDocker(data) {
      const section = document.getElementById('dockerSection');
      const title = document.getElementById('dockerTitle');
      const hasContainers = Object.values(data).some(v => Array.isArray(v) && v.length > 0);

      if (!hasContainers) {
        title.style.display = 'none';
        section.innerHTML = '';
        return;
      }
      title.style.display = 'block';

      let html = '';
      for (const [node, containers] of Object.entries(data)) {
        if (!containers || !Array.isArray(containers) || containers.length === 0) continue;
        const pillCls = s => s === 'running' ? 'running' : s === 'exited' ? 'exited' : 'paused';
        html += `
          <div class="docker-section">
            <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.5rem;font-family:'JetBrains Mono',monospace">${node}</p>
            <table class="docker-table">
              <thead><tr><th>Container</th><th>Image</th><th>Status</th><th>Ports</th></tr></thead>
              <tbody>
                ${containers.map(c => `
                  <tr>
                    <td style="font-weight:500">${c.name}</td>
                    <td>${c.image}</td>
                    <td><span class="container-pill ${pillCls(c.state)}"><span class="cdot ${pillCls(c.state)}"></span> ${c.status}</span></td>
                    <td>${c.ports || '—'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }
      section.innerHTML = html;
    }

    async function refreshAll() {
      try {
        const [config, services, system, docker, update] = await Promise.all([
          fetchJSON('/config'),
          fetchJSON('/services'),
          fetchJSON('/system'),
          fetchJSON('/docker'),
          fetchJSON('/update'),
        ]);
        if (config && config.title) {
          document.getElementById('title').innerHTML = `⚡ ${config.title}`;
          document.title = config.title;
        }
        const banner = document.getElementById('updateBanner');
        if (update && update.available) {
          document.getElementById('updateMsg').textContent = `Update v${update.latest} available (currently v${update.current})`;
          banner.classList.add('show');
        } else {
          banner.classList.remove('show');
        }
        renderServices(services);
        renderSystem(system);
        renderDocker(docker);
        updateTime();
      } catch (err) {
        document.getElementById('servicesCards').innerHTML =
          `<div class="card error-state">Failed to connect: ${err.message}</div>`;
      }
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    function renderSettings(config) {
      const body = document.getElementById('settingsBody');
      let html = `
        <div class="settings-field">
          <label>Dashboard Title</label>
          <input type="text" id="s-title" value="${esc(config.title || '')}" class="settings-input" />
        </div>
        <h3 style="margin-top:1.5rem;font-size:0.9rem;color:var(--text);font-weight:600">Machines</h3>
        <div id="s-nodes">
      `;
      (config.nodes || []).forEach((node, i) => { html += renderNode(node, i); });
      html += `</div>
        <button class="btn" onclick="addNode()" style="margin-top:0.5rem;width:100%;text-align:center">+ Add Machine</button>
      `;
      body.innerHTML = html;
    }

    function toggleAuth(select) {
      const svc = select.closest('.settings-service');
      const val = select.value;
      const fields = svc.querySelector('.auth-fields');
      if (!fields) return;
      fields.querySelector('.s-auth-user').style.display = val === 'basic' ? '' : 'none';
      fields.querySelector('.s-auth-pass').style.display = val === 'basic' ? '' : 'none';
      fields.querySelector('.s-auth-token').style.display = val === 'token' ? '' : 'none';
    }

    function renderNode(node, idx) {
      return `
        <div class="settings-node" data-idx="${idx}">
          <div class="settings-node-header">
            <span style="font-size:0.9rem;color:var(--text)">${esc(node.name || 'Unnamed')}</span>
            <button class="settings-remove" onclick="removeNode(this)" title="Remove">✕</button>
          </div>
          <div class="settings-field">
            <label>Name</label>
            <input type="text" class="settings-input s-name" value="${esc(node.name || '')}" />
          </div>
          <div class="settings-field">
            <label>Host / IP</label>
            <input type="text" class="settings-input s-host" value="${esc(node.host || '')}" />
          </div>
          <div class="settings-field">
            <label>Agent Port (leave blank for local stats)</label>
            <input type="text" class="settings-input s-port" value="${node.agent_port || ''}" />
          </div>
          <div class="settings-field">
            <label><input type="checkbox" class="s-docker" ${node.docker ? 'checked' : ''} /> Monitor Docker containers</label>
          </div>
          <div class="settings-services">
            <label>Services</label>
            ${(node.services || []).map((svc, j) => `
              <div class="settings-service">
                <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.25rem">
                  <input type="text" class="settings-input s-svc-name" value="${esc(svc.name || '')}" placeholder="Name" style="flex:1" />
                  <input type="text" class="settings-input s-svc-url" value="${esc(svc.url || '')}" placeholder="http://..." style="flex:2" />
                  <button class="settings-remove" onclick="removeService(this)" title="Remove">✕</button>
                </div>
                <details class="settings-auth" ${svc.auth ? 'open' : ''}>
                  <summary>Authentication</summary>
                  <select class="s-auth-type" onchange="toggleAuth(this)">
                    <option value="">None</option>
                    <option value="basic" ${svc.auth?.type === 'basic' ? 'selected' : ''}>Basic (username + password)</option>
                    <option value="token" ${svc.auth?.type === 'token' ? 'selected' : ''}>Token / API Key</option>
                  </select>
                  <div class="auth-fields" style="margin-top:0.35rem">
                    <input type="text" class="settings-input s-auth-user" placeholder="Username" style="display:${svc.auth?.type === 'basic' ? '' : 'none'};margin-bottom:0.25rem" value="${esc(svc.auth?.username || '')}" />
                    <input type="password" class="settings-input s-auth-pass" placeholder="Password" style="display:${svc.auth?.type === 'basic' ? '' : 'none'};margin-bottom:0.25rem" value="${esc(svc.auth?.password || '')}" />
                    <input type="text" class="settings-input s-auth-token" placeholder="Token / API key" style="display:${svc.auth?.type === 'token' ? '' : 'none'}" value="${esc(svc.auth?.token || '')}" />
                  </div>
                </details>
              </div>
            `).join('')}
            <button class="btn" onclick="addService(this)" style="font-size:0.8rem;padding:0.3rem 0.6rem;margin-top:0.3rem;width:100%;text-align:center">+ Add Service</button>
          </div>
        </div>
      `;
    }

    function removeNode(btn) { btn.closest('.settings-node').remove(); }
    function removeService(btn) { btn.closest('.settings-service').remove(); }

    function addNode() {
      const container = document.getElementById('s-nodes');
      const div = document.createElement('div');
      div.innerHTML = renderNode({name: '', host: '127.0.0.1', agent_port: null, docker: false, services: []}, Date.now());
      container.appendChild(div.firstElementChild);
    }

    function addService(btn) {
      const container = btn.closest('.settings-services');
      const div = document.createElement('div');
      div.innerHTML = `
        <div class="settings-service">
          <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.25rem">
            <input type="text" class="settings-input s-svc-name" value="" placeholder="Name" style="flex:1" />
            <input type="text" class="settings-input s-svc-url" value="" placeholder="http://..." style="flex:2" />
            <button class="settings-remove" onclick="removeService(this)" title="Remove">✕</button>
          </div>
          <details class="settings-auth">
            <summary>Authentication</summary>
            <select class="s-auth-type" onchange="toggleAuth(this)">
              <option value="">None</option>
              <option value="basic">Basic (username + password)</option>
              <option value="token">Token / API Key</option>
            </select>
            <div class="auth-fields" style="margin-top:0.35rem">
              <input type="text" class="settings-input s-auth-user" placeholder="Username" style="display:none;margin-bottom:0.25rem" />
              <input type="password" class="settings-input s-auth-pass" placeholder="Password" style="display:none;margin-bottom:0.25rem" />
              <input type="text" class="settings-input s-auth-token" placeholder="Token / API key" style="display:none" />
            </div>
          </details>
        </div>
      `;
      container.insertBefore(div.firstElementChild, btn);
    }

    function collectSettings() {
      const cfg = {title: document.getElementById('s-title').value, nodes: []};
      document.querySelectorAll('#s-nodes > .settings-node').forEach(el => {
        const portVal = el.querySelector('.s-port').value.trim();
        const node = {
          name: el.querySelector('.s-name').value,
          host: el.querySelector('.s-host').value,
          agent_port: portVal ? parseInt(portVal, 10) : null,
          docker: el.querySelector('.s-docker').checked,
          services: [],
        };
        el.querySelectorAll('.settings-service').forEach(svcEl => {
          const n = svcEl.querySelector('.s-svc-name').value;
          const u = svcEl.querySelector('.s-svc-url').value;
          if (n || u) {
            const svc = {name: n, url: u};
            const authType = svcEl.querySelector('.s-auth-type')?.value;
            if (authType) {
              svc.auth = {type: authType};
              if (authType === 'basic') {
                svc.auth.username = svcEl.querySelector('.s-auth-user').value;
                svc.auth.password = svcEl.querySelector('.s-auth-pass').value;
              } else if (authType === 'token') {
                svc.auth.token = svcEl.querySelector('.s-auth-token').value;
              }
            }
            node.services.push(svc);
          }
        });
        cfg.nodes.push(node);
      });
      return cfg;
    }

    async function saveSettings() {
      const btn = document.getElementById('saveSettingsBtn');
      btn.textContent = 'Saving...';
      btn.disabled = true;
      try {
        const cfg = collectSettings();
        const res = await fetch('/api/config', {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(cfg),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        closeSettings();
        refreshAll();
      } catch (err) {
        alert('Failed to save settings: ' + err.message);
      } finally {
        btn.textContent = 'Save Changes';
        btn.disabled = false;
      }
    }

    function openSettings() {
      fetchJSON('/config').then(renderSettings).catch(err => {
        document.getElementById('settingsBody').innerHTML =
          `<p class="error-state">Failed to load config: ${err.message}</p>`;
      });
      document.getElementById('settingsModal').style.display = 'flex';
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshAll);
    document.getElementById('settingsBtn').addEventListener('click', openSettings);
    refreshAll();
    setInterval(refreshAll, 15000);
  </script>
</body>
</html>
