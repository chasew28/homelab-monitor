<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Homelab Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      line-height: 1.6;
      color: #e0e0e0;
      background: #000;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 2rem;
    }
    header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    header p { color: #999; font-size: 0.9rem; }
    .dashboard-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem;
    }
    .last-updated { color: #666; font-size: 0.85rem; }
    .refresh-btn {
      background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.2);
      color: #6C63FF; padding: 0.5rem 1rem; border-radius: 8px;
      cursor: pointer; font-family: inherit; font-size: 0.85rem;
    }
    .refresh-btn:hover { background: rgba(108,99,255,0.2); }
    .section-title {
      font-size: 1.1rem; margin-bottom: 1rem; color: #ccc;
      border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 0.5rem;
    }
    .cards {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem; margin-bottom: 2.5rem;
    }
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 1.25rem;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.75rem;
    }
    .card-name { font-weight: 600; font-size: 0.95rem; }
    .status-indicator { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .dot.up { background: #4CAF50; box-shadow: 0 0 8px rgba(76,175,80,0.4); }
    .dot.degraded { background: #FF9800; box-shadow: 0 0 8px rgba(255,152,0,0.4); }
    .dot.down { background: #f44336; box-shadow: 0 0 8px rgba(244,67,54,0.4); }
    .card-url { color: #666; font-size: 0.75rem; word-break: break-all; }
    .card-latency { color: #888; font-size: 0.8rem; margin-top: 0.25rem; }
    .host-badge {
      display: inline-block; background: rgba(255,255,255,0.04);
      padding: 0.15rem 0.5rem; border-radius: 6px; font-size: 0.7rem;
      color: #777; border: 1px solid rgba(255,255,255,0.06); margin-top: 0.5rem;
    }
    .system-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem; margin-bottom: 2.5rem;
    }
    .gauge {
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 1.25rem;
    }
    .gauge-label { font-size: 0.85rem; color: #999; margin-bottom: 0.5rem; }
    .gauge-value { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .gauge-bar {
      height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden;
    }
    .gauge-bar-fill {
      height: 100%; border-radius: 3px; transition: width 0.5s ease;
    }
    .gauge-bar-fill.low { background: #4CAF50; }
    .gauge-bar-fill.med { background: #FF9800; }
    .gauge-bar-fill.high { background: #f44336; }
    .gauge-detail { font-size: 0.75rem; color: #666; margin-top: 0.35rem; }
    .node-section { margin-bottom: 2rem; }
    .node-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .node-name { font-size: 1.1rem; font-weight: 600; color: #ccc; }
    .node-hostname { font-size: 0.8rem; color: #666; }
    .docker-table {
      width: 100%; border-collapse: collapse; margin-bottom: 2.5rem;
    }
    .docker-table th {
      text-align: left; padding: 0.75rem 1rem; font-size: 0.8rem;
      color: #888; border-bottom: 1px solid rgba(255,255,255,0.06);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .docker-table td {
      padding: 0.75rem 1rem; font-size: 0.85rem;
      color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .docker-table tr:hover td { background: rgba(255,255,255,0.02); }
    .container-status { display: inline-flex; align-items: center; gap: 0.4rem; }
    .cdot { width: 8px; height: 8px; border-radius: 50%; }
    .cdot.running { background: #4CAF50; }
    .cdot.exited { background: #f44336; }
    .cdot.paused { background: #FF9800; }
    .error-state { color: #f44336; padding: 2rem; text-align: center; }
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      justify-content: center; align-items: flex-start; overflow-y: auto;
      padding: 2rem;
    }
    .modal {
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
      width: 100%; max-width: 640px; margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .modal-header h2 { font-size: 1.1rem; color: #ccc; }
    .modal-close {
      background: none; border: none; color: #666; font-size: 1.2rem;
      cursor: pointer; padding: 0.25rem;
    }
    .modal-close:hover { color: #f44336; }
    .modal-body { padding: 1.5rem; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 0.5rem;
      padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .settings-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 0.5rem 0.75rem; color: #e0e0e0;
      font-family: inherit; font-size: 0.85rem; outline: none;
    }
    .settings-input:focus { border-color: rgba(108,99,255,0.4); }
    .settings-field { margin-bottom: 0.75rem; }
    .settings-field label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 0.25rem; }
    .settings-field label input[type="checkbox"] { margin-right: 0.35rem; }
    .settings-node {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 1rem; margin-bottom: 1rem;
    }
    .settings-node-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.75rem;
    }
    .settings-remove {
      background: none; border: none; color: #f44336; font-size: 0.9rem;
      cursor: pointer; padding: 0.15rem 0.4rem; border-radius: 4px;
    }
    .settings-remove:hover { background: rgba(244,67,54,0.1); }
    .settings-service {
      display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.4rem;
    }
    .settings-service .s-svc-name { flex: 1; }
    .settings-service .s-svc-url { flex: 2; }
    .settings-services { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.04); }
    .settings-services label { display: block; margin-bottom: 0.4rem; }
    .service-logo { display: inline-flex; vertical-align: middle; margin-right: 0.4rem; }
    .service-logo svg { display: block; }
    .service-stats { margin: 0.5rem 0 0.25rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.04); }
    .stat-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; padding: 0.15rem 0; }
    .stat-label { color: #888; min-width: 5rem; }
    .stat-value { color: #e0e0e0; font-weight: 600; }
    .stat-pct { color: #FF9800; font-size: 0.75rem; }
    .auth-hint { color: #FF9800; font-size: 0.75rem; margin-top: 0.35rem; font-style: italic; }
    .settings-auth { margin-top: 0.5rem; padding: 0.5rem; background: rgba(255,255,255,0.02); border-radius: 8px; }
    .settings-auth summary { cursor: pointer; font-size: 0.8rem; color: #888; }
    .settings-auth summary:hover { color: #ccc; }
    .settings-auth .settings-field { margin-bottom: 0.4rem; }
    .settings-auth .settings-field label { font-size: 0.75rem; }
    .settings-auth select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 0.4rem 0.6rem; color: #e0e0e0; font-family: inherit; font-size: 0.8rem; outline: none; }
    footer {
      text-align: center; padding: 2rem; border-top: 1px solid #222;
      color: #666; font-size: 0.875rem;
    }
    .update-banner {
      background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.2);
      border-radius: 10px; padding: 0.6rem 1rem; margin-bottom: 1.5rem;
      display: none; justify-content: space-between; align-items: center;
      font-size: 0.85rem;
    }
    .update-banner.show { display: flex; }
    .update-banner a { color: #4CAF50; text-decoration: none; font-weight: 600; }
    .update-banner a:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      header h1 { font-size: 1.5rem; }
      .cards { grid-template-columns: 1fr; }
      .system-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="title">Homelab Monitor</h1>
      <p>Real-time status of services and system resources</p>
    </header>

    <div class="dashboard-header">
      <span class="last-updated" id="lastUpdated">Loading...</span>
      <div>
        <button class="refresh-btn" id="settingsBtn">⚙ Settings</button>
        <button class="refresh-btn" id="refreshBtn">Refresh Now</button>
      </div>
    </div>

    <div id="updateBanner" class="update-banner">
      <span>🚀 <span id="updateMsg">Update available</span></span>
      <a href="#" onclick="event.preventDefault(); window.open('https://github.com/chasew28/homelab-monitor/releases', '_blank')">View Release</a>
    </div>

    <h2 class="section-title">Services</h2>
    <div class="cards" id="servicesCards">
      <div class="card"><p style="color:#666">Loading services...</p></div>
    </div>

    <h2 class="section-title">System Resources</h2>
    <div id="systemGrid"></div>

    <h2 class="section-title" id="dockerTitle" style="display:none">Docker Containers</h2>
    <div id="dockerSection"></div>
  </div>

  <div id="settingsModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body" id="settingsBody"></div>
      <div class="modal-footer">
        <button class="refresh-btn" onclick="closeSettings()">Cancel</button>
        <button class="refresh-btn" id="saveSettingsBtn" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <footer>
    <p>Homelab Monitor</p>
  </footer>

  <script>
    const API_BASE = '/api';

    async function fetchJSON(endpoint) {
      const res = await fetch(`${API_BASE}${endpoint}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function updateTime() {
      document.getElementById('lastUpdated').textContent =
        `Last updated: ${new Date().toLocaleTimeString()}`;
    }

    function dot(status) {
      return `<span class="dot ${status}"></span>`;
    }

    const LOGOS = {
      adguard: '<svg viewBox="0 0 40 40" width="28" height="28"><rect width="40" height="40" rx="8" fill="#4CAF50"/><text x="20" y="26" text-anchor="middle" fill="#fff" font-size="16" font-family="sans-serif" font-weight="bold">AG</text></svg>',
      pihole: '<svg viewBox="0 0 40 40" width="28" height="28"><rect width="40" height="40" rx="8" fill="#2196F3"/><text x="20" y="26" text-anchor="middle" fill="#fff" font-size="16" font-family="sans-serif" font-weight="bold">PH</text></svg>',
    };

    function fmtNum(n) {
      if (n === undefined || n === null) return '';
      return n.toLocaleString();
    }

    function renderServices(data) {
      const container = document.getElementById('servicesCards');
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="card"><p style="color:#666">No services configured</p></div>';
        return;
      }
      container.innerHTML = data.map(s => {
        const logoHtml = s.type && LOGOS[s.type] ? `<span class="service-logo">${LOGOS[s.type]}</span>` : '';
        const label = s.service_name || s.name;
        let statsHtml = '';
        if (s.authError) {
          statsHtml = '<div class="auth-hint">Auth required — add credentials in Settings</div>';
        } else if (s.stats) {
          const rows = [];
          if (s.stats.queries !== undefined) rows.push(`<div class="stat-row"><span class="stat-label">Queries</span><span class="stat-value">${fmtNum(s.stats.queries)}</span></div>`);
          if (s.stats.blocked !== undefined) rows.push(`<div class="stat-row"><span class="stat-label">Blocked</span><span class="stat-value">${fmtNum(s.stats.blocked)}</span>${s.stats.blockedPercent !== undefined ? `<span class="stat-pct">(${s.stats.blockedPercent}%)</span>` : ''}</div>`);
          if (rows.length) statsHtml = `<div class="service-stats">${rows.join('')}</div>`;
        }
        return `
          <div class="card">
            <div class="card-header">
              <span class="card-name">${logoHtml}${label}</span>
              <span class="status-indicator">${dot(s.status)} ${s.status}</span>
            </div>
            <div class="card-url">${s.url}</div>
            ${s.latency_ms !== null ? `<div class="card-latency">${s.latency_ms}ms</div>` : ''}
            ${statsHtml}
            <div class="host-badge">${s.host}</div>
          </div>
        `;
      }).join('');
    }

    function renderSystem(nodes) {
      const grid = document.getElementById('systemGrid');
      grid.innerHTML = '';

      function barClass(pct) { return pct < 60 ? 'low' : pct < 85 ? 'med' : 'high'; }
      function fmtBytes(b) {
        if (!b) return '0 B';
        const u = ['B','KB','MB','GB','TB']; let i = 0; let v = b;
        while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
        return `${v.toFixed(1)} ${u[i]}`;
      }
      function fmtUptime(s) {
        return `${Math.floor(s/86400)}d ${Math.floor((s%86400)/3600)}h ${Math.floor((s%3600)/60)}m`;
      }

      for (const [name, data] of Object.entries(nodes)) {
        if (data.error) {
          grid.innerHTML += `<div class="node-section"><div class="gauge error-state">${name}: ${data.error}</div></div>`;
          continue;
        }
        const temp = data.cpu_temp !== null ? `${data.cpu_temp}°C` : 'N/A';
        grid.innerHTML += `
          <div class="node-section">
            <div class="node-header">
              <span class="node-name">${name}</span>
              <span class="node-hostname">${data.hostname}</span>
            </div>
            <div class="system-grid">
              <div class="gauge">
                <div class="gauge-label">CPU</div>
                <div class="gauge-value">${data.cpu_percent}%</div>
                <div class="gauge-bar"><div class="gauge-bar-fill ${barClass(data.cpu_percent)}" style="width:${data.cpu_percent}%"></div></div>
                <div class="gauge-detail">Temp: ${temp}</div>
              </div>
              <div class="gauge">
                <div class="gauge-label">RAM</div>
                <div class="gauge-value">${data.ram_percent}%</div>
                <div class="gauge-bar"><div class="gauge-bar-fill ${barClass(data.ram_percent)}" style="width:${data.ram_percent}%"></div></div>
                <div class="gauge-detail">${fmtBytes(data.ram_used)} / ${fmtBytes(data.ram_total)}</div>
              </div>
              <div class="gauge">
                <div class="gauge-label">Disk</div>
                <div class="gauge-value">${data.disk_percent}%</div>
                <div class="gauge-bar"><div class="gauge-bar-fill ${barClass(data.disk_percent)}" style="width:${data.disk_percent}%"></div></div>
                <div class="gauge-detail">${fmtBytes(data.disk_used)} / ${fmtBytes(data.disk_total)}</div>
              </div>
              <div class="gauge">
                <div class="gauge-label">Uptime</div>
                <div class="gauge-value" style="font-size:1.2rem">${fmtUptime(data.uptime_seconds)}</div>
                <div class="gauge-detail">Host: ${data.hostname}</div>
              </div>
            </div>
          </div>
        `;
      }
    }

    function renderDocker(data) {
      const section = document.getElementById('dockerSection');
      const title = document.getElementById('dockerTitle');
      const hasContainers = Object.values(data).some(v => Array.isArray(v) && v.length > 0);

      if (!hasContainers) {
        title.style.display = 'none';
        section.innerHTML = '';
        return;
      }
      title.style.display = 'block';

      let html = '';
      for (const [node, containers] of Object.entries(data)) {
        if (!containers || !Array.isArray(containers) || containers.length === 0) continue;
        const sc = s => s === 'running' ? 'running' : s === 'exited' ? 'exited' : 'paused';
        html += `
          <p style="color:#999;font-size:0.85rem;margin-bottom:0.5rem">${node}</p>
          <table class="docker-table">
            <thead><tr><th>Name</th><th>Image</th><th>Status</th><th>Ports</th></tr></thead>
            <tbody>
              ${containers.map(c => `
                <tr>
                  <td><span class="container-status"><span class="cdot ${sc(c.state)}"></span> ${c.name}</span></td>
                  <td>${c.image}</td>
                  <td>${c.status}</td>
                  <td>${c.ports || '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }
      section.innerHTML = html;
    }

    async function refreshAll() {
      try {
        const [config, services, system, docker, update] = await Promise.all([
          fetchJSON('/config'),
          fetchJSON('/services'),
          fetchJSON('/system'),
          fetchJSON('/docker'),
          fetchJSON('/update'),
        ]);
        if (config && config.title) {
          document.getElementById('title').textContent = config.title;
          document.title = config.title;
        }
        const banner = document.getElementById('updateBanner');
        if (update && update.available) {
          document.getElementById('updateMsg').textContent = `Update v${update.latest} available (currently v${update.current})`;
          banner.classList.add('show');
        } else {
          banner.classList.remove('show');
        }
        renderServices(services);
        renderSystem(system);
        renderDocker(docker);
        updateTime();
      } catch (err) {
        document.getElementById('servicesCards').innerHTML =
          `<div class="card error-state">Failed to connect: ${err.message}</div>`;
      }
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    function renderSettings(config) {
      const body = document.getElementById('settingsBody');
      let html = `
        <div class="settings-field">
          <label>Dashboard Title</label>
          <input type="text" id="s-title" value="${esc(config.title || '')}" class="settings-input" />
        </div>
        <h3 style="margin-top:1.5rem">Machines</h3>
        <div id="s-nodes">
      `;
      (config.nodes || []).forEach((node, i) => {
        html += renderNode(node, i);
      });
      html += `</div>
        <button class="refresh-btn" onclick="addNode()" style="margin-top:0.5rem">+ Add Machine</button>
      `;
      body.innerHTML = html;
    }

    function toggleAuth(select) {
      const svc = select.closest('.settings-service');
      const val = select.value;
      const fields = svc.querySelector('.auth-fields');
      if (!fields) return;
      fields.querySelector('.s-auth-user').style.display = val === 'basic' ? '' : 'none';
      fields.querySelector('.s-auth-pass').style.display = val === 'basic' ? '' : 'none';
      fields.querySelector('.s-auth-token').style.display = val === 'token' ? '' : 'none';
    }

    function renderNode(node, idx) {
      return `
        <div class="settings-node" data-idx="${idx}">
          <div class="settings-node-header">
            <span style="font-size:0.9rem;color:#ccc">${esc(node.name || 'Unnamed')}</span>
            <button class="settings-remove" onclick="removeNode(this)" title="Remove">✕</button>
          </div>
          <div class="settings-field">
            <label>Name</label>
            <input type="text" class="settings-input s-name" value="${esc(node.name || '')}" />
          </div>
          <div class="settings-field">
            <label>Host / IP</label>
            <input type="text" class="settings-input s-host" value="${esc(node.host || '')}" />
          </div>
          <div class="settings-field">
            <label>Agent Port (leave blank for local stats)</label>
            <input type="text" class="settings-input s-port" value="${node.agent_port || ''}" />
          </div>
          <div class="settings-field">
            <label><input type="checkbox" class="s-docker" ${node.docker ? 'checked' : ''} /> Monitor Docker containers</label>
          </div>
          <div class="settings-services">
            <label>Services</label>
            ${(node.services || []).map((svc, j) => `
              <div class="settings-service">
                <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.25rem">
                  <input type="text" class="settings-input s-svc-name" value="${esc(svc.name || '')}" placeholder="Name" style="flex:1" />
                  <input type="text" class="settings-input s-svc-url" value="${esc(svc.url || '')}" placeholder="http://..." style="flex:2" />
                  <button class="settings-remove" onclick="removeService(this)" title="Remove">✕</button>
                </div>
                <details class="settings-auth" ${svc.auth ? 'open' : ''}>
                  <summary>Authentication</summary>
                  <select class="s-auth-type" onchange="toggleAuth(this)">
                    <option value="">None</option>
                    <option value="basic" ${svc.auth?.type === 'basic' ? 'selected' : ''}>Basic (username + password)</option>
                    <option value="token" ${svc.auth?.type === 'token' ? 'selected' : ''}>Token / API Key</option>
                  </select>
                  <div class="auth-fields" style="margin-top:0.35rem">
                    <input type="text" class="settings-input s-auth-user" placeholder="Username" style="display:${svc.auth?.type === 'basic' ? '' : 'none'};margin-bottom:0.25rem" value="${esc(svc.auth?.username || '')}" />
                    <input type="password" class="settings-input s-auth-pass" placeholder="Password" style="display:${svc.auth?.type === 'basic' ? '' : 'none'};margin-bottom:0.25rem" value="${esc(svc.auth?.password || '')}" />
                    <input type="text" class="settings-input s-auth-token" placeholder="Token / API key" style="display:${svc.auth?.type === 'token' ? '' : 'none'}" value="${esc(svc.auth?.token || '')}" />
                  </div>
                </details>
              </div>
            `).join('')}
            <button class="refresh-btn" onclick="addService(this)" style="font-size:0.8rem;padding:0.3rem 0.6rem;margin-top:0.3rem">+ Add Service</button>
          </div>
        </div>
      `;
    }

    function removeNode(btn) {
      btn.closest('.settings-node').remove();
    }

    function removeService(btn) {
      btn.closest('.settings-service').remove();
    }

    function addNode() {
      const container = document.getElementById('s-nodes');
      const div = document.createElement('div');
      div.innerHTML = renderNode({name: '', host: '127.0.0.1', agent_port: null, docker: false, services: []}, Date.now());
      container.appendChild(div.firstElementChild);
    }

    function addService(btn) {
      const container = btn.closest('.settings-services');
      const div = document.createElement('div');
      div.innerHTML = `
        <div class="settings-service">
          <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.25rem">
            <input type="text" class="settings-input s-svc-name" value="" placeholder="Name" style="flex:1" />
            <input type="text" class="settings-input s-svc-url" value="" placeholder="http://..." style="flex:2" />
            <button class="settings-remove" onclick="removeService(this)" title="Remove">✕</button>
          </div>
          <details class="settings-auth">
            <summary>Authentication</summary>
            <select class="s-auth-type" onchange="toggleAuth(this)">
              <option value="">None</option>
              <option value="basic">Basic (username + password)</option>
              <option value="token">Token / API Key</option>
            </select>
            <div class="auth-fields" style="margin-top:0.35rem">
              <input type="text" class="settings-input s-auth-user" placeholder="Username" style="display:none;margin-bottom:0.25rem" />
              <input type="password" class="settings-input s-auth-pass" placeholder="Password" style="display:none;margin-bottom:0.25rem" />
              <input type="text" class="settings-input s-auth-token" placeholder="Token / API key" style="display:none" />
            </div>
          </details>
        </div>
      `;
      container.insertBefore(div.firstElementChild, btn);
    }

    function collectSettings() {
      const cfg = {title: document.getElementById('s-title').value, nodes: []};
      document.querySelectorAll('#s-nodes > .settings-node').forEach(el => {
        const portVal = el.querySelector('.s-port').value.trim();
        const node = {
          name: el.querySelector('.s-name').value,
          host: el.querySelector('.s-host').value,
          agent_port: portVal ? parseInt(portVal, 10) : null,
          docker: el.querySelector('.s-docker').checked,
          services: [],
        };
        el.querySelectorAll('.settings-service').forEach(svcEl => {
          const n = svcEl.querySelector('.s-svc-name').value;
          const u = svcEl.querySelector('.s-svc-url').value;
          if (n || u) {
            const svc = {name: n, url: u};
            const authType = svcEl.querySelector('.s-auth-type')?.value;
            if (authType) {
              svc.auth = {type: authType};
              if (authType === 'basic') {
                svc.auth.username = svcEl.querySelector('.s-auth-user').value;
                svc.auth.password = svcEl.querySelector('.s-auth-pass').value;
              } else if (authType === 'token') {
                svc.auth.token = svcEl.querySelector('.s-auth-token').value;
              }
            }
            node.services.push(svc);
          }
        });
        cfg.nodes.push(node);
      });
      return cfg;
    }

    async function saveSettings() {
      const btn = document.getElementById('saveSettingsBtn');
      btn.textContent = 'Saving...';
      btn.disabled = true;
      try {
        const cfg = collectSettings();
        const res = await fetch('/api/config', {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(cfg),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        closeSettings();
        refreshAll();
      } catch (err) {
        alert('Failed to save settings: ' + err.message);
      } finally {
        btn.textContent = 'Save';
        btn.disabled = false;
      }
    }

    function openSettings() {
      fetchJSON('/config').then(renderSettings).catch(err => {
        document.getElementById('settingsBody').innerHTML =
          `<p class="error-state">Failed to load config: ${err.message}</p>`;
      });
      document.getElementById('settingsModal').style.display = 'flex';
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshAll);
    document.getElementById('settingsBtn').addEventListener('click', openSettings);
    refreshAll();
    setInterval(refreshAll, 15000);
  </script>
</body>
</html>
